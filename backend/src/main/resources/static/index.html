<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        body.dark {
            background: #1e1e1e;
        }

        .login-box {
            position: relative;
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 300px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        body.dark .login-box {
            background: #2c2c2c;
            color: white;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
        }

        body.dark input {
            background: #3a3a3a;
            color: white;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .theme-toggle {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: none;
            background: #eee;
            cursor: pointer;
        }

        body.dark .theme-toggle {
            background: #444;
            color: white;
        }
    </style>
</head>

<body>

<div class="login-box">

    <button class="theme-toggle" id="themeBtn">🌙</button>

    <h2>Přihlášení</h2>

    <input type="text" id="username" placeholder="Uživatelské jméno">
    <input type="password" id="password" placeholder="Heslo">

    <button id="loginBtn">Přihlásit se</button>

    <p id="result"></p>

</div>

<script src="theme.js"></script>
<script src="login.js"></script>

</body>
</html>
