<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f8;

            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        body.dark {
            background: #1e1e1e;
        }

        .login-box {
            position: relative;
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 300px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        body.dark .login-box {
            background: #2c2c2c;
            color: white;
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }

        body.dark input {
            background: #3a3a3a;
            color: white;
            border: 1px solid #555;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
        }

        button:hover {
            background: #43a047;
        }

        body.dark button {
            background: #66bb6a;
        }

        body.dark button:hover {
            background: #57a65a;
        }

        #result {
            margin-top: 10px;
            color: red;
            font-size: 14px;
        }

        .theme-toggle {
            position: absolute;
            top: 10px;
            right: 10px;

            width: 35px;
            height: 35px;

            border-radius: 50%;
            border: none;

            background: #eee;
            cursor: pointer;
            font-size: 16px;
        }

        .theme-toggle:hover {
            background: #ddd;
        }

        body.dark .theme-toggle {
            background: #444;
            color: white;
        }

        body.dark .theme-toggle:hover {
            background: #555;
        }
    </style>
</head>
<body>

<div class="login-box">

    <button class="theme-toggle" onclick="toggleDark()">🌙</button>

    <h2>Přihlášení</h2>

    <input type="text" id="username" placeholder="Uživatelské jméno">
    <input type="password" id="password" placeholder="Heslo">

    <button onclick="login()">Přihlásit se</button>

    <p id="result"></p>

</div>

<script>
    function toggleDark() {
        document.body.classList.toggle("dark");

        const btn = document.querySelector(".theme-toggle");

        if (document.body.classList.contains("dark")) {
            btn.innerText = "☀️";
            localStorage.setItem("theme", "dark");
        } else {
            btn.innerText = "🌙";
            localStorage.setItem("theme", "light");
        }
    }

    if (localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark");
        document.querySelector(".theme-toggle").innerText = "☀️";
    }

    function login() {
        const username = document.getElementById("username").value;
        const password = document.getElementById("password").value;

        fetch("/api/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ username, password })
        })
        .then(res => res.text())
        .then(data => {
            if (data === "OK") {
                localStorage.setItem("user", username);
                window.location.href = "home.html";
            } else {
                document.getElementById("result").innerText = "Špatné jméno nebo heslo";
            }
        });
    }
</script>

</body>
</html>
