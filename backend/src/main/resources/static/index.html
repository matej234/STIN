<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
</head>
<body>

<h2>Login</h2>

<input type="text" id="username" placeholder="Zadej jméno">
<button onclick="login()">Login</button>

<p id="result"></p>

<script>
    function login() {
        const username = document.getElementById("username").value;

        fetch("/api/login", {
            method: "POST",
            headers: {
                "Content-Type": "text/plain"
            },
            body: username
        })
        .then(res => res.text())
        .then(data => {
            if (data === "OK") {
                localStorage.setItem("user", username);
                window.location.href = "home.html";
            } else {
                document.getElementById("result").innerText = "Login fail";
            }
        });
    }
</script>

</body>
</html>
