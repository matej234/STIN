<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Home</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      transition: 0.2s;
    }

    body.dark {
      background: #121212;
      color: #e6e6e6;
    }

    #mainBox {
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
      background: white;
      border-radius: 12px;
      position: relative;
      transition: 0.2s;
    }

    body.dark #mainBox {
      background: #1f1f1f;
    }

    body.dark h1,
    body.dark h2,
    body.dark h3,
    body.dark h4,
    body.dark p,
    body.dark label {
      color: #e6e6e6;
    }

    body.dark #currencyList,
    body.dark #timeframeCurrencies,
    body.dark #statsContainer {
      background: #1f1f1f !important;
      border: 1px solid #333 !important;
    }

    body.dark #currencyList label,
    body.dark #timeframeCurrencies label {
      color: #e6e6e6;
    }

    .theme-toggle {
      position: fixed;
      top: 15px;
      right: 15px;

      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: none;

      display: flex;
      align-items: center;
      justify-content: center;

      cursor: pointer;
      font-size: 18px;
      background: #eee;
      z-index: 1000;
    }

    body.dark .theme-toggle {
      background: #333;
      color: white;
    }

    body.dark select,
    body.dark input {
      background: #2a2a2a;
      color: #e6e6e6;
      border: 1px solid #444;
    }

    body.dark input[type="date"] {
      color-scheme: dark;
    }

    body.dark button {
      background: #333;
      color: #e6e6e6;
      border: 1px solid #444;
    }

    body.dark button:hover {
      background: #444;
    }

  </style>
</head>

<body>

<button class="theme-toggle" onclick="toggleDark()">🌙</button>

<div id="mainBox">
  <h1 id="welcome"></h1>

  <h2>Analýza měn</h2>

  <h4>Základní měna</h4>
  <select id="baseCurrency" onchange="recalculate()"></select>

  <div style="display:flex; gap:20px; flex-wrap:wrap; margin-top:15px;">

    <div style="flex:1; min-width:300px;">
      <h4>Výběr měn</h4>
      <div id="currencyList" style="
        max-height:260px;
        overflow-y:auto;
        border:1px solid #ddd;
        border-radius:8px;
        padding:10px;
        background:#fafafa;
      "></div>
    </div>

    <div style="flex:1; min-width:300px;">
      <h4>Výběr měn (období)</h4>
      <div id="timeframeCurrencies" style="
        max-height:260px;
        overflow-y:auto;
        border:1px solid #ddd;
        border-radius:8px;
        padding:10px;
        background:#fafafa;
      "></div>
    </div>

  </div>

  <h4 style="margin-top:20px;">Základní měna pro období</h4>
  <select id="timeframeBase"></select>

  <div style="margin-top:15px;">
    <input type="date" id="start">
    <input type="date" id="end">

    <button onclick="loadTimeframe()" style="margin-left:10px;">
      Načíst období
    </button>
  </div>
  <hr>

  <div id="statsContainer"></div>

</div>
<script>
  const DEV_MODE = location.hostname === "localhost";

  const user = localStorage.getItem("user");
  if (!user) window.location.href = "index.html";

  document.getElementById("welcome").innerText = "Ahoj " + user;

  function logout() {
    localStorage.removeItem("user");
    window.location.href = "index.html";
  }

  let rates = {};
  let apiBase = "";

  async function init() {

    let data;

    if (DEV_MODE) {
      data = await (await fetch("/data/rates.json")).json();
    } else {
      data = await (await fetch("/api/currency/rates")).json();
    }

    apiBase = data.source;
    rates = data.quotes;

    const currencies = new Set();

    for (let key in rates) {
      currencies.add(key.substring(3));
    }

    currencies.add(apiBase);

    const sorted = Array.from(currencies).sort();

    const baseSelect = document.getElementById("baseCurrency");
    const tfBase = document.getElementById("timeframeBase");

    const currencyList = document.getElementById("currencyList");
    const tfList = document.getElementById("timeframeCurrencies");

    const defaults = ["USD","EUR","GBP"];

    for (let c of sorted) {
      baseSelect.add(new Option(c, c));
      tfBase.add(new Option(c, c));
    }

    baseSelect.value = apiBase;
    tfBase.value = apiBase;

    for (let c of sorted) {
      const label = document.createElement("label");
      label.style.display = "block";

      const input = document.createElement("input");
      input.type = "checkbox";
      input.value = c;
      input.checked = defaults.includes(c);
      input.onchange = recalculate;

      label.appendChild(input);
      label.append(" " + c);

      currencyList.appendChild(label);
    }

    for (let c of sorted) {
      const label = document.createElement("label");
      label.style.display = "block";

      const input = document.createElement("input");
      input.type = "checkbox";
      input.value = c;
      input.checked = defaults.includes(c);

      label.appendChild(input);
      label.append(" " + c);

      tfList.appendChild(label);
    }

    recalculate();
  }

  function getSelectedCurrencies() {
    return [...document.querySelectorAll("#currencyList input:checked")]
      .map(el => el.value);
  }

  function getTimeframeCurrencies() {
    return [...document.querySelectorAll("#timeframeCurrencies input:checked")]
      .map(el => el.value);
  }

  function getRate(currency) {
    if (currency === apiBase) return 1;
    return rates[apiBase + currency];
  }

  function recalculate() {

    const base = document.getElementById("baseCurrency").value;
    const selected = getSelectedCurrencies();

    if (!selected.length) return;

    const baseRate = getRate(base);

    let strongest = null;
    let weakest = null;
    let output = "";

    for (let c of selected) {

      if (c === base) continue;

      const value = getRate(c) / baseRate;

      output += `<p>1 ${base} = ${value.toFixed(4)} ${c}</p>`;

      if (!strongest || value < strongest.value)
        strongest = { currency: c, value };

      if (!weakest || value > weakest.value)
        weakest = { currency: c, value };
    }

    document.getElementById("statsContainer").innerHTML = `
      <h4>Aktuální porovnání</h4>
      <p><b>Nejsilnější měna:</b> 1 ${base} = ${strongest.value.toFixed(4)} ${strongest.currency}</p>
      <p><b>Nejslabší měna:</b> 1 ${base} = ${weakest.value.toFixed(4)} ${weakest.currency}</p>
      <hr>
      ${output}
    `;
  }

  async function loadTimeframe() {

    const start = document.getElementById("start").value;
    const end = document.getElementById("end").value;

    if (!start || !end) return;

    let data;

    if (DEV_MODE) {
      data = await (await fetch("/data/timeframe.json")).json();
    } else {
      data = await (await fetch(`/api/currency/timeframe?start_date=${start}&end_date=${end}`)).json();
    }

    analyzeTimeframe(data.quotes);
  }

  function analyzeTimeframe(quotes) {

    const selected = getTimeframeCurrencies();
    const base = document.getElementById("timeframeBase").value;

    if (!quotes || Object.keys(quotes).length === 0) {
      document.getElementById("statsContainer").innerHTML = "Žádná data";
      return;
    }

    if (!selected.length) {
      document.getElementById("statsContainer").innerHTML = "Vyber měny";
      return;
    }

    const series = {};

    for (const date in quotes) {
      const day = quotes[date];

      for (const key in day) {
        const currency = key.substring(3);

        if (!selected.includes(currency)) continue;

        if (!series[currency]) series[currency] = [];

        const baseRate = base === apiBase ? 1 : day[apiBase + base];
        const currencyRate = day[apiBase + currency];

        if (!baseRate || !currencyRate) continue;

        const value = currencyRate / baseRate;
        series[currency].push(value);
      }
    }

    let html = `
      <h4>Průměry za období</h4>
      <table style="width:100%; border-collapse:collapse;">
        <tr>
          <th style="text-align:left;">Měna</th>
          <th style="text-align:left;">Průměr</th>
        </tr>
    `;

    for (const c in series) {
      const arr = series[c];
      const avg = arr.reduce((a,b) => a + b, 0) / arr.length;

      html += `
        <tr>
          <td style="text-align:left;">${c}</td>
          <td style="text-align:left;">${avg.toFixed(4)}</td>
        </tr>
      `;
    }

    html += `</table>`;

    document.getElementById("statsContainer").innerHTML = html;
  }
  function toggleDark() {
    document.body.classList.toggle("dark");

    const btn = document.querySelector(".theme-toggle");

    if (document.body.classList.contains("dark")) {
        btn.innerText = "☀️";
        localStorage.setItem("theme", "dark");
    } else {
        btn.innerText = "🌙";
        localStorage.setItem("theme", "light");
    }
    }

    if (localStorage.getItem("theme") === "dark") {
      document.body.classList.add("dark");
      setTimeout(() => {
          document.querySelector(".theme-toggle").innerText = "☀️";
      }, 0);
  }


  init();
</script>

</body>
</html>
