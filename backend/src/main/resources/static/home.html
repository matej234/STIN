<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Home</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
    }

    #mainBox {
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
      background: white;
      border-radius: 12px;
      position: relative;
    }

    .theme-toggle {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
    }

    body.dark {
      background: #1e1e1e;
      color: white;
    }

    body.dark #mainBox {
      background: #2c2c2c;
    }
  </style>
</head>

<body>

<div id="mainBox">

  <h1 id="welcome"></h1>

  <button onclick="toggleLang()" data-key="langToggle"></button>

  <h2 data-key="analysis"></h2>

  <button class="theme-toggle" id="themeBtn">🌙</button>

  <h4 data-key="baseCurrency"></h4>
  <select id="baseCurrency"></select>

  <div style="display:flex; gap:20px; flex-wrap:wrap; margin-top:15px;">

    <div style="flex:1; min-width:300px;">
      <h4 data-key="currencySelection"></h4>
      <div id="currencyList"></div>
    </div>

    <div style="flex:1; min-width:300px;">
      <h4 data-key="timeframeSelection"></h4>
      <div id="timeframeCurrencies"></div>
    </div>

  </div>

  <h4 style="margin-top:20px;" data-key="baseCurrency"></h4>
  <select id="timeframeBase"></select>

  <div style="margin-top:15px;">
    <input type="date" id="start">
    <input type="date" id="end">

    <button onclick="loadData()" data-key="calculateCurrent"></button>
    <button onclick="loadTimeframe()" data-key="load"></button>
    <button onclick="saveSettings()" data-key="save"></button>
  </div>

  <hr>

  <div id="analyzeContainer"></div>
  <hr>
  <div id="timeframeContainer"></div>

</div>

<script src="language.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="home.js" defer></script>
<script src="theme.js"></script>

</body>
</html>
